# Great Docs Configuration
# See https://posit-dev.github.io/great-docs/user-guide/configuration.html

# Module Name (optional)
# ----------------------
# Set this if your importable module name differs from the project name.
# Example: project 'py-yaml12' with module name 'yaml12'
# module: yaml12

# Display Name
# ------------
# Title shown in the navbar and browser tab.
display_name: etielle

# GitHub Repository
# -----------------
# Canonical repository URL (used for source links and the GitHub widget).
repo: https://github.com/Promptly-Technologies-LLC/etielle

# Docstring Parser
# ----------------
# The docstring format used in your package (numpy, google, or sphinx)
parser: google

# Dynamic Introspection
# ---------------------
# Use runtime introspection for more accurate documentation (default: true)
# Set to false if your package has cyclic alias issues (e.g., PyO3/Rust bindings)
dynamic: true

# API Discovery Settings
# ----------------------
# Exclude items from auto-documentation
# exclude:
#   - InternalClass
#   - helper_function

# Logo & Favicon
# ---------------
# Point to a single logo file (replaces the text title in the navbar):
# logo: assets/logo.svg
#
# For light/dark variants:
# logo:
#   light: assets/logo-light.svg
#   dark: assets/logo-dark.svg
#
# To show the text title alongside the logo, add: show_title: true

# Funding / Copyright Holder
# --------------------------
# Credit the organization that funds or holds copyright for this package.
# Displays in sidebar and footer. Homepage and ROR provide links.
# funding:
#   name: "Posit Software, PBC"
#   roles:
#     - Copyright holder
#     - funder
#   homepage: https://posit.co
#   ror: https://ror.org/03wc8by49

# User Guide Structure
# --------------------
# Explicit ordering and section grouping for the narrative user guide.
# Files are referenced by name relative to the user-guide/ directory.
# Using explicit ordering (instead of numeric filename prefixes) keeps the
# source filenames identical to their published URLs, so links resolve both
# on the rendered site and when browsing the repository on GitHub.
user_guide:
  - section: "Getting Started"
    contents:
      - introduction-to-etl.qmd
  - section: "Core Concepts"
    contents:
      - navigation.qmd
      - transforms.qmd
      - mapping.qmd
      - relationships.qmd
  - section: "Advanced Topics"
    contents:
      - database-loading.qmd
      - custom-transforms.qmd
      - error-handling.qmd

